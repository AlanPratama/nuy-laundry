version: "3"

services:
  app:
    build: .
    container_name: nuy_laundry
    ports:
      - "3000:80"
    restart: always

  nginx-proxy:
    image: jc21/nginx-proxy-manager
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
    restart: always